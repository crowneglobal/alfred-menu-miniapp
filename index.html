<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Alfred</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0e1621);
    --secbg: var(--tg-theme-secondary-bg-color, #17212b);
    --card: #1c2a38;
    --card2: #22323f;
    --txt: var(--tg-theme-text-color, #e9eef3);
    --sub: var(--tg-theme-hint-color, #7d8b99);
    --accent: var(--tg-theme-button-color, #f0663f);
    --accent-txt: var(--tg-theme-button-text-color, #ffffff);
    --link: var(--tg-theme-link-color, #6aa8eb);
    --line: #2a3746;
    --gold: #f0c846;
    --green: #5fbf78;
    --coral: #f0663f;
    --violet: #9b7ff0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--txt);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px; overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  header {
    padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line); background: var(--secbg);
  }
  header .logo {
    width: 34px; height: 34px; border-radius: 9px; flex: none;
    background: linear-gradient(135deg, var(--coral), var(--violet));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #fff; font-size: 18px;
  }
  header .htxt { display: flex; flex-direction: column; line-height: 1.1; }
  header .htxt b { font-size: 17px; }
  header .htxt span { font-size: 12px; color: var(--sub); margin-top: 2px; }
  header .ctx { margin-left: auto; font-size: 12px; color: var(--sub);
    background: var(--card); padding: 5px 10px; border-radius: 20px; }

  main { flex: 1; overflow-y: auto; padding: 14px 14px 20px; -webkit-overflow-scrolling: touch; }
  .view-title { font-size: 20px; font-weight: 800; margin: 2px 2px 12px; display:flex; align-items:center; gap:8px; }
  .view-title .em { font-size: 22px; }
  .hint { color: var(--sub); font-size: 13px; margin: -6px 2px 14px; }

  /* company / sub selector chips */
  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 12px; }
  .chip {
    flex: none; padding: 7px 14px; border-radius: 20px; background: var(--card);
    color: var(--sub); font-size: 13px; font-weight: 600; border: 1px solid transparent;
  }
  .chip.active { background: var(--accent); color: var(--accent-txt); }

  /* generic card */
  .card {
    background: var(--card); border-radius: 14px; padding: 13px 14px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px; border: 1px solid var(--line);
  }
  .card .num { color: var(--gold); font-weight: 800; font-size: 15px; width: 18px; flex:none; text-align:center; }
  .card .body { flex: 1; min-width: 0; }
  .card .body .t { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .body .s { color: var(--sub); font-size: 12.5px; margin-top: 3px; }
  .card .right { flex: none; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .badge.gold { background: rgba(240,200,70,.16); color: var(--gold); }
  .badge.green { background: rgba(95,191,120,.16); color: var(--green); }
  .badge.coral { background: rgba(240,102,63,.16); color: var(--coral); }
  .badge.violet{ background: rgba(155,127,240,.18); color: var(--violet); }

  .avatar { width: 40px; height: 40px; border-radius: 50%; flex:none; display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:15px; }

  /* task row w/ drag handle + up/down + checkbox */
  .task { background: var(--card); border-radius: 14px; padding: 11px 12px; margin-bottom: 9px;
    display: flex; align-items: center; gap: 10px; border: 1px solid var(--line); }
  .task.done { opacity: .5; }
  .task.done .tt { text-decoration: line-through; }
  .handle { color: var(--sub); font-size: 20px; cursor: grab; touch-action: none; flex:none; padding: 0 2px; }
  .cbox { width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--sub); flex:none; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; }
  .cbox.on { background: var(--green); border-color: var(--green); }
  .task .tbody { flex: 1; min-width: 0; }
  .task .tt { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task .ts { color: var(--sub); font-size: 12px; margin-top: 2px; display:flex; gap:8px; align-items:center; }
  .arrows { display: flex; flex-direction: column; gap: 2px; flex: none; }
  .arrows button { background: var(--card2); border: none; color: var(--link); width: 30px; height: 21px; border-radius: 6px; font-size: 11px; line-height: 1; }
  .arrows button:disabled { color: var(--line); }
  .sortable-ghost { opacity: .35; }
  .sortable-chosen { background: var(--card2); box-shadow: 0 6px 20px rgba(0,0,0,.4); }

  .modehdr { display:flex; align-items:center; justify-content:space-between; margin: 4px 2px 12px; }
  .modehdr .mtoggle { display:flex; gap:6px; }
  .mbtn { background: var(--card); color: var(--sub); border: 1px solid var(--line); border-radius: 10px; padding: 7px 11px; font-size: 15px; }
  .mbtn.active { background: var(--accent); color: var(--accent-txt); border-color: var(--accent); }

  /* bottom selector strip */
  nav {
    display: flex; background: var(--secbg); border-top: 1px solid var(--line);
    padding: 6px 4px calc(6px + env(safe-area-inset-bottom)); flex: none;
  }
  nav button {
    flex: 1; background: none; border: none; color: var(--sub); padding: 6px 0 4px;
    display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px;
  }
  nav button .ne { font-size: 20px; line-height: 1; }
  nav button.active { color: var(--accent-txt); }
  nav button.active .ne { transform: translateY(-1px); }
  nav button.active .nl { color: var(--txt); font-weight: 700; }

  /* detail sheet */
  .sheet-back { position: fixed; inset: 0; background: rgba(0,0,0,.55); opacity:0; pointer-events:none; transition: opacity .2s; z-index: 40; }
  .sheet-back.on { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--secbg);
    border-radius: 18px 18px 0 0; padding: 8px 16px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .25s cubic-bezier(.2,.8,.2,1); z-index: 41; max-height: 82vh; overflow-y:auto; }
  .sheet.on { transform: translateY(0); }
  .sheet .grip { width: 40px; height: 4px; border-radius: 4px; background: var(--line); margin: 6px auto 14px; }
  .sheet h3 { margin: 0 0 4px; font-size: 19px; }
  .sheet .meta { color: var(--sub); font-size: 13px; margin-bottom: 16px; }
  .actrow { display: flex; gap: 10px; flex-wrap: wrap; }
  .act { flex: 1; min-width: 44%; background: var(--card); border: 1px solid var(--line); color: var(--txt);
    border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 600; display:flex; align-items:center; justify-content:center; gap:8px; }
  .act.primary { background: var(--accent); color: var(--accent-txt); border-color: var(--accent); }
  .kv { display:flex; justify-content:space-between; padding: 11px 2px; border-bottom: 1px solid var(--line); font-size: 14px; }
  .kv .k { color: var(--sub); }
  .empty { text-align:center; color: var(--sub); padding: 40px 20px; font-size: 14px; }
  .addfab { position: fixed; right: 16px; bottom: 78px; width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: var(--accent-txt); border:none; font-size: 28px; box-shadow: 0 6px 18px rgba(0,0,0,.4); z-index: 30; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">A</div>
    <div class="htxt"><b>Alfred</b><span id="hsub">Main menu</span></div>
    <div class="ctx" id="ctx">DRO</div>
  </header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<button class="addfab" id="fab" style="display:none">+</button>
<div class="sheet-back" id="sheetBack"></div>
<div class="sheet" id="sheet"><div class="grip"></div><div id="sheetContent"></div></div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
try { if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor && tg.setHeaderColor('secondary_bg_color'); } } catch(e){}
function haptic(t){ try{ tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred(t||'light'); }catch(e){} }

/* ---------- mock data (shapes mirror the real Alfred menu) ---------- */
const FEATURES = [
  {key:'tasks', em:'☑️', label:'Tasks'},
  {key:'contacts', em:'🪪', label:'Contacts'},
  {key:'reminders', em:'⏰', label:'Reminders'},
  {key:'expenses', em:'💰', label:'Expenses'},
  {key:'payments', em:'💳', label:'Payments'},
  {key:'team', em:'👥', label:'Team'},
  {key:'bhc', em:'🫂', label:'BHC'},
];

const LISTS = ['QBO','VET','LIR','FER'];
let activeList = 'QBO';

const DATA = {
  tasks: {
    QBO: [
      {id:1, t:'Follow up supplier quote', s:'Ops · due today', pr:'P1', done:false},
      {id:2, t:'Pay utility invoice', s:'Finance · $1,240', pr:'P2', done:false},
      {id:3, t:'Send parts list', s:'Maintenance · 5 items', pr:'', done:false},
      {id:4, t:'Review pull request', s:'Dev · reorder feature', pr:'P3', done:false},
      {id:5, t:'Confirm weekly schedule', s:'Team · this week', pr:'', done:true},
    ],
    VET: [
      {id:11, t:'Order stock', s:'Inventory', pr:'P1', done:false},
      {id:12, t:'Call supplier re invoice', s:'Finance', pr:'', done:false},
    ],
    LIR: [ {id:21, t:'Run staff payroll', s:'Due Fri', pr:'P2', done:false} ],
    FER: [ {id:31, t:'Restock tools', s:'Tools', pr:'', done:false} ],
  },
  contacts: [
    {id:1, name:'Alex Morgan', s:'Family · WhatsApp', clr:'#5fbf78'},
    {id:2, name:'Sam Rivera', s:'Advisor · call', clr:'#9b7ff0'},
    {id:3, name:'Jordan Lee', s:'Maintenance', clr:'#f0663f'},
    {id:4, name:'Dev Contact', s:'Engineering', clr:'#6aa8eb'},
    {id:5, name:'Casey Kim', s:'Operations', clr:'#f0c846'},
  ],
  reminders: [
    {id:1, t:'Fresh-cut fruit delivery', s:'in 30 min', badge:'30m', clr:'green'},
    {id:2, t:'Flight deal check', s:'Today 4:00 PM', badge:'today', clr:'coral'},
    {id:3, t:'Filing deadline', s:'in 3 days', badge:'3d', clr:'gold'},
    {id:4, t:'Weekly plan review', s:'Tomorrow 8 AM', badge:'1d', clr:'violet'},
  ],
  expenses: [
    {id:1, t:'Groceries', s:'Home ledger', amt:'-$182.40', clr:'coral'},
    {id:2, t:'Resale payout', s:'Arbitrage', amt:'+$540.00', clr:'green'},
    {id:3, t:'Currency transfer', s:'~1.5% fee', amt:'-$21.50', clr:'coral'},
    {id:4, t:'Filing fee', s:'Ops', amt:'-$95.00', clr:'coral'},
  ],
  payments: [
    {id:1, t:'Staff A', s:'Weekly · pending', amt:'$120', due:true},
    {id:2, t:'Vendor B', s:'Parts reimburse', amt:'$88', due:true},
    {id:3, t:'Contractor C', s:'Invoice · paid', amt:'$450', due:false},
  ],
  team: [
    {id:1, name:'Staff A', s:'Housekeeping · clocked in', clr:'#f0c846', on:true},
    {id:2, name:'Vendor B', s:'Maintenance · off', clr:'#f0663f', on:false},
    {id:3, name:'Crew', s:'3 staff · payroll Fri', clr:'#5fbf78', on:true},
  ],
  bhc: [
    {id:1, t:'Sample bug one', s:'x3 · in progress', st:'open', clr:'coral'},
    {id:2, t:'Sample bug two', s:'x2 · triaged', st:'open', clr:'gold'},
    {id:3, t:'Sample bug three', s:'resolved', st:'done', clr:'green'},
  ],
};

/* ---------- state ---------- */
let current = 'tasks';
let taskMode = 'reorder'; // reorder | open | priority
const main = document.getElementById('main');

/* ---------- render ---------- */
function setHeader(label){ document.getElementById('hsub').textContent = label; }

function render(){
  const f = FEATURES.find(x=>x.key===current);
  setHeader(f.label);
  document.getElementById('fab').style.display = (current==='tasks') ? 'flex' : 'none';
  if (current==='tasks') renderTasks();
  else if (current==='contacts') renderList('contacts','🪪','Contacts', c=>({title:c.name, sub:c.s, avatar:c.name, clr:c.clr}));
  else if (current==='reminders') renderReminders();
  else if (current==='expenses') renderExpenses();
  else if (current==='payments') renderPayments();
  else if (current==='team') renderTeam();
  else if (current==='bhc') renderBHC();
  renderNav();
  updateMainButton();
}

function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderTasks(){
  const list = DATA.tasks[activeList];
  let html = '';
  html += `<div class="chips">` + LISTS.map(l=>`<div class="chip ${l===activeList?'active':''}" data-list="${l}">${l}</div>`).join('') + `</div>`;
  html += `<div class="modehdr"><div style="font-weight:800;font-size:15px">${activeList} · Tasks</div>
     <div class="mtoggle">
       <button class="mbtn ${taskMode==='reorder'?'active':''}" data-mode="reorder" title="Reorder">↕️</button>
       <button class="mbtn ${taskMode==='priority'?'active':''}" data-mode="priority" title="Priority">🥇</button>
       <button class="mbtn ${taskMode==='open'?'active':''}" data-mode="open" title="Open">💎</button>
     </div></div>`;
  html += `<div id="tasklist">`;
  list.forEach((task,i)=>{
    html += taskRow(task,i,list.length);
  });
  html += `</div>`;
  if(!list.length) html = `<div class="empty">No tasks in ${activeList}. Tap + to add one.</div>`;
  main.innerHTML = html;

  main.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ activeList=c.dataset.list; haptic(); render(); });
  main.querySelectorAll('.mbtn').forEach(b=>b.onclick=()=>{ taskMode=b.dataset.mode; haptic(); render(); });
  wireTaskRows();

  if(taskMode==='reorder' && window.Sortable){
    const el=document.getElementById('tasklist');
    Sortable.create(el,{ handle:'.handle', animation:160, ghostClass:'sortable-ghost', chosenClass:'sortable-chosen',
      onEnd:(e)=>{ const arr=DATA.tasks[activeList]; const [m]=arr.splice(e.oldIndex,1); arr.splice(e.newIndex,0,m); haptic('medium'); render(); }});
  }
}

function taskRow(task,i,n){
  const drag = taskMode==='reorder' ? `<div class="handle">⣿</div>` : '';
  const arrows = taskMode==='reorder' ? `<div class="arrows">
      <button data-up="${i}" ${i===0?'disabled':''}>▲</button>
      <button data-down="${i}" ${i===n-1?'disabled':''}>▼</button></div>` : '';
  const pr = task.pr ? `<span class="badge ${task.pr==='P1'?'coral':task.pr==='P2'?'gold':'violet'}">${task.pr}</span>` : '';
  return `<div class="task ${task.done?'done':''}" data-id="${task.id}">
    ${drag}
    <div class="cbox ${task.done?'on':''}" data-check="${task.id}">${task.done?'✓':''}</div>
    <div class="tbody" data-open="${task.id}">
      <div class="tt">${esc(task.t)}</div>
      <div class="ts">${pr}<span>${esc(task.s)}</span></div>
    </div>
    ${arrows}
  </div>`;
}

function wireTaskRows(){
  main.querySelectorAll('[data-check]').forEach(el=>el.onclick=(ev)=>{ ev.stopPropagation();
    const id=+el.dataset.check; const t=DATA.tasks[activeList].find(x=>x.id===id); t.done=!t.done; haptic(); render(); });
  main.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>{ const id=+el.dataset.open; openTask(id); });
  main.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>move(+b.dataset.up,-1));
  main.querySelectorAll('[data-down]').forEach(b=>b.onclick=()=>move(+b.dataset.down,1));
}
function move(i,dir){ const arr=DATA.tasks[activeList]; const j=i+dir; if(j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]]; haptic('medium'); render(); }

function renderList(key,em,title,map){
  const rows = DATA[key].map(item=>{ const m=map(item);
    const av = m.avatar ? `<div class="avatar" style="background:${m.clr}">${m.avatar.trim()[0]}</div>` : '';
    return `<div class="card" data-open="${item.id}" data-key="${key}">${av}
      <div class="body"><div class="t">${esc(m.title)}</div><div class="s">${esc(m.sub)}</div></div>
      <div class="right"><span style="color:var(--sub)">›</span></div></div>`;
  }).join('');
  main.innerHTML = rows || `<div class="empty">Nothing here yet.</div>`;
  main.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openGeneric(key,+el.dataset.open));
}

function renderReminders(){
  main.innerHTML = DATA.reminders.map(r=>`
    <div class="card" data-open="${r.id}" data-key="reminders">
      <div class="body"><div class="t">${esc(r.t)}</div><div class="s">${esc(r.s)}</div></div>
      <div class="right"><span class="badge ${r.clr}">${r.badge}</span></div></div>`).join('');
  main.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openReminder(+el.dataset.open));
}
function renderExpenses(){
  main.innerHTML = DATA.expenses.map(e=>`
    <div class="card"><div class="body"><div class="t">${esc(e.t)}</div><div class="s">${esc(e.s)}</div></div>
      <div class="right"><b style="color:var(--${e.clr})">${esc(e.amt)}</b></div></div>`).join('');
}
function renderPayments(){
  main.innerHTML = DATA.payments.map(p=>`
    <div class="card"><div class="body"><div class="t">${esc(p.t)}</div><div class="s">${esc(p.s)}</div></div>
      <div class="right"><b>${esc(p.amt)}</b>${p.due?`<button class="badge coral" data-pay="${p.id}" style="border:none">Pay</button>`:`<span class="badge green">paid</span>`}</div></div>`).join('');
  main.querySelectorAll('[data-pay]').forEach(b=>b.onclick=()=>{ haptic('medium'); tg&&tg.showConfirm?tg.showConfirm('Send this payment?',()=>{}):alert('(demo) payment confirm'); });
}
function renderTeam(){
  main.innerHTML = DATA.team.map(t=>`
    <div class="card"><div class="avatar" style="background:${t.clr}">${t.name.trim()[0]}</div>
      <div class="body"><div class="t">${esc(t.name)}</div><div class="s">${esc(t.s)}</div></div>
      <div class="right"><span class="badge ${t.on?'green':'violet'}">${t.on?'on':'off'}</span></div></div>`).join('');
}
function renderBHC(){
  main.innerHTML = DATA.bhc.map(b=>`
    <div class="card"><div class="body"><div class="t">${esc(b.t)}</div><div class="s">${esc(b.s)}</div></div>
      <div class="right"><span class="badge ${b.clr}">${b.st}</span></div></div>`).join('');
}

/* ---------- detail sheets ---------- */
const sheet=document.getElementById('sheet'), sheetBack=document.getElementById('sheetBack'), sheetContent=document.getElementById('sheetContent');
function showSheet(html){ sheetContent.innerHTML=html; sheet.classList.add('on'); sheetBack.classList.add('on'); haptic(); }
function hideSheet(){ sheet.classList.remove('on'); sheetBack.classList.remove('on'); }
sheetBack.onclick=hideSheet;

function openTask(id){
  const t=DATA.tasks[activeList].find(x=>x.id===id); if(!t) return;
  showSheet(`<h3>${esc(t.t)}</h3><div class="meta">${activeList} · ${esc(t.s)}</div>
    <div class="kv"><span class="k">Status</span><span>${t.done?'Done':'Open'}</span></div>
    <div class="kv"><span class="k">Priority</span><span>${t.pr||'—'}</span></div>
    <div class="kv"><span class="k">List</span><span>${activeList}</span></div>
    <div class="actrow" style="margin-top:16px">
      <button class="act primary" id="aDone">${t.done?'Reopen':'Complete'}</button>
      <button class="act" id="aClose">Close</button></div>`);
  document.getElementById('aDone').onclick=()=>{ t.done=!t.done; hideSheet(); render(); };
  document.getElementById('aClose').onclick=hideSheet;
}
function openReminder(id){
  const r=DATA.reminders.find(x=>x.id===id);
  showSheet(`<h3>${esc(r.t)}</h3><div class="meta">${esc(r.s)}</div>
    <div class="actrow">
      <button class="act">30m</button><button class="act">15m</button>
      <button class="act primary" style="min-width:100%">Completed</button></div>`);
  sheetContent.querySelectorAll('.act').forEach(b=>b.onclick=hideSheet);
}
function openGeneric(key,id){
  const item=DATA[key].find(x=>x.id===id); if(!item) return;
  const name=item.name||item.t;
  showSheet(`<h3>${esc(name)}</h3><div class="meta">${esc(item.s||'')}</div>
    <div class="actrow">
      <button class="act primary">Message</button>
      <button class="act">Details</button></div>`);
  sheetContent.querySelectorAll('.act').forEach(b=>b.onclick=hideSheet);
}

/* ---------- nav ---------- */
function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=FEATURES.map(f=>`<button data-key="${f.key}" class="${f.key===current?'active':''}">
     <span class="ne">${f.em}</span><span class="nl">${f.label}</span></button>`).join('');
  nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{ current=b.dataset.key; haptic(); hideSheet(); main.scrollTop=0; render(); });
}

/* ---------- Telegram MainButton ---------- */
function updateMainButton(){
  if(!tg||!tg.MainButton) return;
  if(current==='tasks'){ tg.MainButton.setText('＋ Add task'); tg.MainButton.show(); }
  else tg.MainButton.hide();
}
if(tg&&tg.MainButton){ tg.MainButton.onClick(()=>addTask()); }
document.getElementById('fab').onclick=()=>addTask();

function addTask(){
